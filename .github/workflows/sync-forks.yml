name: Daily Fork Sync and Approve Releases

on:
  schedule:
    - cron: '0 3 * * *'  # 03:00 UTC daily
  workflow_dispatch:

jobs:
  sync-forks:
    runs-on: ubuntu-latest
    steps:
      - name: Sync all michelemilazzo forks with upstream
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          PAGE=1
          SYNCED=0
          FAILED=0

          while true; do
            REPOS=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/user/repos?type=forks&per_page=100&page=$PAGE" \
              | jq -r '.[] | select(.fork==true) | .full_name')

            [ -z "$REPOS" ] && break

            for REPO in $REPOS; do
              DEFAULT_BRANCH=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
                "https://api.github.com/repos/$REPO" | jq -r '.default_branch')

              RESULT=$(curl -s -o /dev/null -w "%{http_code}" \
                -X POST \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"branch\":\"$DEFAULT_BRANCH\"}" \
                "https://api.github.com/repos/$REPO/merge-upstream")

              if [ "$RESULT" = "200" ] || [ "$RESULT" = "409" ]; then
                echo "OK [$RESULT]: $REPO"
                SYNCED=$((SYNCED+1))
              else
                echo "SKIP [$RESULT]: $REPO"
                FAILED=$((FAILED+1))
              fi
            done

            PAGE=$((PAGE+1))
          done

          echo "Done: $SYNCED synced, $FAILED skipped/failed"

  approve-releases:
    runs-on: ubuntu-latest
    needs: sync-forks
    env:
      PRESS_KEY: ${{ secrets.PRESS_API_KEY }}
      PRESS_SECRET: ${{ secrets.PRESS_API_SECRET }}
      PRESS_URL: ${{ secrets.PRESS_URL }}
    steps:
      - name: Approve all Draft App Releases in Press marketplace
        run: |
          # Get all Draft releases
          RELEASES=$(curl -s -G "$PRESS_URL/api/method/frappe.client.get_list" \
            --data-urlencode "doctype=App Release" \
            --data-urlencode "fields=[\"name\",\"app\",\"hash\"]" \
            --data-urlencode "filters=[[\"status\",\"=\",\"Draft\"]]" \
            --data-urlencode "order_by=creation desc" \
            --data-urlencode "limit=100" \
            -H "Authorization: token $PRESS_KEY:$PRESS_SECRET" \
            | jq -r '.message[] | "\(.name) \(.app)"')

          COUNT=0
          while IFS=' ' read -r NAME APP; do
            [ -z "$NAME" ] && continue
            STATUS=$(curl -s -X PUT "$PRESS_URL/api/resource/App%20Release/$NAME" \
              -H "Authorization: token $PRESS_KEY:$PRESS_SECRET" \
              -H "Content-Type: application/json" \
              -d '{"status":"Approved"}' \
              | jq -r '.data.status // "error"')
            echo "Approved: $APP / $NAME -> $STATUS"
            COUNT=$((COUNT+1))
          done <<< "$RELEASES"

          echo "Total approved: $COUNT"
